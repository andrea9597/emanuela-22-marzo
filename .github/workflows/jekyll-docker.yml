        function showSensorDetailModal(sensorId) { const sensor = MOCK_DATA.guardian.sensors.find(s => s.id === sensorId); showModal(`<div class="p-6 text-left"><h2 class="text-xl font-bold mb-4 dark:text-gray-50">${sensor.name}</h2><div class="space-y-2 text-gray-700 dark:text-gray-300"><p><strong>Stato:</strong> <span class="${sensor.status === 'ok' ? 'text-green-600' : 'text-yellow-600'} font-semibold">OK</span></p><p><strong>Posizione:</strong> ${sensor.location}</p><p><strong>Batteria:</strong> ${sensor.battery}%</p></div><div class="flex justify-end space-x-3 mt-6"><button onclick="hideModal()" class="bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg active-feedback">Chiudi</button><button onclick="showEditSensorModal(${sensorId})" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg active-feedback">Modifica</button></div></div>`); }
        function showManageSensorsModal() { let sensorsHTML = MOCK_DATA.guardian.sensors.map(sensor => `<div class="text-left p-3 flex items-center justify-between border-b border-gray-200"><div class="flex items-center"><div class="mr-3">${ICONS[sensor.icon]}</div><div><p class="font-semibold">${sensor.name}</p><p class="text-sm text-gray-500">${sensor.location}</p></div></div><button onclick="confirmRemoveSensor(${sensor.id})" class="p-2 text-gray-400 hover:text-red-500 active-feedback">${ICONS.trash}</button></div>`).join(''); showModal(`<div class="p-4 text-left"><h2 class="text-xl font-bold mb-2 text-center">Gestisci Sensori</h2>${sensorsHTML}<div onclick="showAddSensorModal()" class="text-left p-3 flex items-center text-blue-600 font-semibold cursor-pointer hover:bg-gray-100 active-feedback"><i class="ph-plus-circle-fill text-xl mr-3"></i><span>Aggiungi un nuovo sensore</span></div><button onclick="hideModal()" class="w-full bg-gray-200 text-gray-800 font-semibold py-2 mt-4 rounded-lg active-feedback">Chiudi</button></div>`); }
