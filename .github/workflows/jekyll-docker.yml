            </div>`;
        }

        function renderHealthScoreDetailPage() {
            const { totalScore, docScore, maintScore, efficiencyScore } = calculateHealthScores();
            
            let scoreColorClass = 'text-green-500';
            let ringColorClass = 'stroke-green-500';
            if (totalScore < 75) { 
                scoreColorClass = 'text-yellow-500';
                ringColorClass = 'stroke-yellow-500';
            }
            if (totalScore < 50) { 
                scoreColorClass = 'text-red-500';
                ringColorClass = 'stroke-red-500';
            }

            const radius = 50;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (totalScore / 100) * circumference;

            let suggestions = [];
            const hasAPE = MOCK_DATA.documents.some(d => d.homeId === MOCK_DATA.currentHomeId && d.name.includes("APE"));

            if (!hasAPE) {
                suggestions.push({ icon: 'file-plus', text: "Manca l'Attestato di Prestazione Energetica (APE). Aggiungilo per migliorare il punteggio.", page: 'documents', params: {}, actionText: "Aggiungi" });
            }
            if (maintScore < 50) {
                suggestions.push({ icon: 'calendar', text: "Hai pochi interventi programmati. Pianificare la manutenzione previene guasti costosi.", page: 'maintenance', params: {}, actionText: "Pianifica" });
            }
            if (efficiencyScore < 90) { 
                suggestions.push({ icon: 'bolt', text: "Migliora l'efficienza energetica. Valuta l'installazione di un termostato smart.", page: 'shopCategory', params: {category: 'Sicurezza'}, actionText: "Scopri" });
            }
            if (MOCK_DATA.inventory.filter(i => i.homeId === MOCK_DATA.currentHomeId).length < 3) {
                suggestions.push({ icon: 'archive-box', text: "Il tuo inventario è quasi vuoto. Aggiungi i tuoi beni di valore per pratiche assicurative più semplici.", page: 'inventory', params: {}, actionText: "Aggiungi" });
            }
             if (MOCK_DATA.guardian.sensors.length < 3) {
                 suggestions.push({ icon: 'shield', text: "Potenzia la sicurezza. Aggiungi altri sensori Guardian per una copertura completa.", page: 'guardian', params: {}, actionText: "Gestisci" });
            }
            
            const suggestionsHTML = suggestions.map(s => {
                const paramsString = JSON.stringify(s.params || {}).replace(/'/g, "\\'");
                return `
                <div class="bg-white dark:bg-gray-800 p-3 rounded-xl border border-gray-200 dark:border-gray-700 flex items-center justify-between">
                    <div class="flex items-center flex-grow mr-2">
                        <div class="mr-3 text-blue-600 dark:text-blue-400">${ICONS[s.icon] || ICONS.check}</div>
                        <div>
                            <p class="text-sm font-medium text-gray-800 dark:text-gray-200">${s.text}</p>
                        </div>
                    </div>
                    <button 
                        data-page='${s.page}' 
                        data-params='${JSON.stringify(s.params || {})}'
                        class="suggestion-button bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 text-xs font-bold py-2 px-3 rounded-full hover:bg-blue-200 dark:hover:bg-blue-900/80 flex-shrink-0 active-feedback">
                        ${s.actionText}
                    </button>
                </div>`;
            }).join('');

            const scoreCard = (score, title, description, iconKey) => {
                let barColor = 'bg-green-500';
                if (score < 75) barColor = 'bg-yellow-500';
