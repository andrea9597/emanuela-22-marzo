        function showDashboardSettingsModal() {
            const renderWidgetList = () => {
                const container = document.getElementById('widget-list-container');
                if (!container) return;

                container.innerHTML = MOCK_DATA.dashboardLayout.widgets.map((w, index) => `
                    <div class="flex justify-between items-center bg-gray-50 dark:bg-gray-700 p-3 rounded-lg border dark:border-gray-600" draggable="true" data-widget-id="${w.id}" data-index="${index}">
                        <div class="flex items-center">
                            <span class="cursor-grab text-gray-400 mr-3">${ICONS.list}</span>
                            <span class="font-medium dark:text-gray-100">${w.name}</span>
                        </div>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" data-visibility-id="${w.id}" class="sr-only peer" ${w.visible ? 'checked' : ''}>
                            <div class="relative w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 dark:bg-gray-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-500 peer-checked:bg-blue-600"></div>
                        </label>
                    </div>
                `).join('');

                const draggables = container.querySelectorAll('[draggable="true"]');
                draggables.forEach(draggable => {
                    draggable.addEventListener('dragstart', () => {
                        draggable.classList.add('opacity-50');
                    });
                    draggable.addEventListener('dragend', () => {
                        draggable.classList.remove('opacity-50');
                    });
                    draggable.addEventListener('dragover', e => {
                        e.preventDefault();
                        const afterElement = getDragAfterElement(container, e.clientY);
                        const dragging = document.querySelector('.opacity-50');
                        if (afterElement == null) {
                            container.appendChild(dragging);
                        } else {
                            container.insertBefore(dragging, afterElement);
                        }
                    });
                });
            };

            const modalContent = `<div class="p-6 text-left">
                <h2 class="text-xl font-bold mb-1 text-center">Personalizza Home</h2>
                <p class="text-center text-sm text-gray-500 mb-4">Trascina per riordinare i widget.</p>
                <div id="widget-list-container" class="space-y-2"></div>
                <button onclick="saveDashboardSettings()" class="w-full bg-blue-600 text-white font-semibold py-2 mt-6 rounded-lg active-feedback">Salva</button>
            </div>`;

            showModal(modalContent);
            renderWidgetList();
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('[draggable="true"]:not(.opacity-50)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function saveDashboardSettings() {
            const newWidgetOrder = [];
            const tempWidgets = [...MOCK_DATA.dashboardLayout.widgets];
            document.querySelectorAll('#widget-list-container [data-widget-id]').forEach(el => {
                const widgetId = el.dataset.widgetId;
                const widget = tempWidgets.find(w => w.id === widgetId);
                if(widget) {
                    const checkbox = document.querySelector(`input[data-visibility-id="${widgetId}"]`);
                    widget.visible = checkbox.checked;
                    newWidgetOrder.push(widget);
                }
            });

            MOCK_DATA.dashboardLayout.widgets = newWidgetOrder;

            hideModal();
            renderAllMain();
        }

