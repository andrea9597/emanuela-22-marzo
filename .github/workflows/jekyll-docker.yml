    <title>CertifyHome - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configurazione per abilitare la modalità scura basata su classe con il CDN di Tailwind
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        html, body {
            overscroll-behavior-y: contain;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item.active i { color: #2563eb; }
        .nav-item.active span { color: #2563eb; font-weight: 600; }
        .dark .nav-item.active i, .dark .nav-item.active span { color: #60a5fa; }
        
        .loader {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        .dark .loader { border-color: #374151; border-top-color: #60a5fa; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .fade-out { animation: fadeOut 0.3s ease-in-out; }
        .slide-in-up { animation: slideInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .slide-in-right { animation: slideInRight 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes slideInUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Splash Screen Animations */
        #splash-screen .logo-container { animation: pop-in 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards; }
        #splash-screen .logo-path, #splash-screen .check-path { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 1.5s ease-in-out 1.5s forwards; }
        #splash-screen .check-path { animation-delay: 2s; }
        #splash-screen .splash-text-container span { opacity: 0; transform: translate3d(0, 20px, 0) scale(0.9); animation: reveal-char 0.5s cubic-bezier(0.215, 0.61, 0.355, 1) forwards; }
        
        @keyframes pop-in { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes reveal-char { to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); } }
        
        .chat-bubble { max-width: 80%; }
        .chat-bubble.user { background-color: #2563eb; color: white; }
        .chat-bubble.assistant { background-color: #e5e7eb; color: #1f2937; }
        .dark .chat-bubble.assistant { background-color: #374151; color: #f9fafb; }


        /* Health Score Ring */
        .ring { transform: rotate(-90deg); }
        .ring circle { transition: stroke-dashoffset 0.8s ease-in-out; }

        /* AR Guide */
        .ar-hotspot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        /* Touch Feedback */
        .active-feedback {
            transition: transform 0.1s, filter 0.1s;
        }
        .active-feedback:active {
            transform: scale(0.96);
            filter: brightness(0.95);
        }
        [onclick] {
            cursor: pointer;
        }
        
        /* Onboarding */
        .onboarding-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 999;
            transition: opacity 0.3s;
        }
        .onboarding-highlight {
            position: absolute;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.7);
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .onboarding-modal {
            position: absolute;
            z-index: 1001;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
