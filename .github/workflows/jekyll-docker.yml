        function renderBudgetPage() {
            // Usa una data fissa per avere una demo consistente con i dati mock
            const now = new Date("2025-10-06T10:00:00"); 

            const costs = MOCK_DATA.costs.filter(c => {
                if (c.homeId !== MOCK_DATA.currentHomeId) return false;
                
                const costDate = new Date(c.date);
                
                if (appState.budgetFilter === '7days') {
                    const sevenDaysAgo = new Date(now);
                    sevenDaysAgo.setDate(now.getDate() - 7);
                    return costDate >= sevenDaysAgo && costDate <= now;
                } else if (appState.budgetFilter === 'month') {
                    // Per la demo, usiamo il mese di Settembre 2025 dove ci sono più dati
                    return costDate.getMonth() === 8 && costDate.getFullYear() === 2025;
                } else if (appState.budgetFilter === 'year') {
                    return costDate.getFullYear() === now.getFullYear();
                }
                return false;
            });

            const categories = costs.reduce((acc, cost) => {
                acc[cost.category] = (acc[cost.category] || 0) + cost.amount;
                return acc;
            }, {});
            const total = costs.reduce((sum, cost) => sum + cost.amount, 0);
            
            const renderOverview = () => {
                const filters = [ { key: '7days', label: '7 giorni' }, { key: 'month', label: 'Mese' }, { key: 'year', label: 'Anno' }];
                const filterButtonsHTML = `<div class="flex space-x-2 bg-gray-100 dark:bg-gray-800 p-1 rounded-xl">${filters.map(f => `<button onclick="setBudgetFilter('${f.key}')" class="w-full text-center py-2 text-sm font-semibold rounded-lg transition ${appState.budgetFilter === f.key ? 'bg-white dark:bg-gray-900 text-blue-600 dark:text-blue-400 shadow' : 'text-gray-500 dark:text-gray-400'} active-feedback">${f.label}</button>`).join('')}</div>`;

                const categoryColors = { "Utenze": "#3b82f6", "Riparazioni": "#ef4444", "Tasse": "#f97316", "Manutenzione": "#eab308", "Miglioramenti": "#14b8a6", "Altro": "#8b5cf6" };
                let gradientString = '';
                let legendHTML = '';
                let cumulativePercentage = 0;
                const sortedCategories = Object.entries(categories).sort(([, a], [, b]) => b - a);

                sortedCategories.forEach(([category, amount]) => {
                    const percentage = total > 0 ? (amount / total) * 100 : 0;
                    const color = categoryColors[category] || '#6b7280';
                    if (percentage > 0) {
                        gradientString += `${color} ${cumulativePercentage}% ${cumulativePercentage + percentage}%, `;
                        legendHTML += `<div class="flex items-center justify-between text-sm py-1.5"><div class="flex items-center"><span class="w-3 h-3 rounded-full mr-3" style="background-color: ${color}"></span><span class="text-gray-600 dark:text-gray-300">${category}</span></div><span class="font-semibold dark:text-gray-100">${amount.toFixed(2)}€</span></div>`;
                        cumulativePercentage += percentage;
                    }
                });

                gradientString = gradientString.slice(0, -2);
                
                if (total === 0) {
                    gradientString = '#e5e7eb';
                    legendHTML = '<p class="text-center text-sm text-gray-500 dark:text-gray-400 py-8">Nessuna spesa registrata per questo periodo.</p>';
                }

                const pieChartHTML = `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-200 dark:border-gray-700">
                    <div class="relative w-48 h-48 mx-auto">
                        <div class="w-full h-full rounded-full" style="background: conic-gradient(${gradientString});"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-28 h-28 bg-white dark:bg-gray-800 rounded-full flex flex-col items-center justify-center shadow-inner">
                                <span class="text-xs text-gray-500 dark:text-gray-400">Totale</span>
                                <span class="text-2xl font-bold text-gray-800 dark:text-gray-100">${total.toFixed(0)}€</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 space-y-1 divide-y divide-gray-100 dark:divide-gray-700/50">${legendHTML}</div>
                </div>`;

                const costsListHTML = costs.map(cost => `
                    <div class="flex justify-between items-center bg-white dark:bg-gray-800 p-3 rounded-lg border dark:border-gray-700">
                        <div class="flex-grow">
                            <p class="font-semibold dark:text-gray-100">${cost.name}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">${new Date(cost.date).toLocaleDateString('it-IT')}</p>
                        </div>
                        <div class="flex items-center">
                            <p class="font-bold text-lg mr-2 dark:text-gray-50">${cost.amount.toFixed(2)}€</p>
                            <button onclick="showDeleteCostConfirmationModal(${cost.id})" class="text-gray-400 hover:text-red-500 p-2 active-feedback">${ICONS.trash}</button>
                        </div>
                    </div>`).join('');

                return `<div class="space-y-6">
                    ${filterButtonsHTML}
                    ${pieChartHTML}
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-semibold text-lg dark:text-gray-50">Dettaglio Spese</h3>
                            <button onclick="showAddCostModal()" class="text-blue-600 dark:text-blue-400 text-sm font-semibold active-feedback">Aggiungi +</button>
                        </div>
                        <div class="space-y-2">${costs.length > 0 ? costsListHTML : '<div class="text-center text-gray-500 py-8 bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-700"><p>Nessuna spesa da mostrare.</p></div>'}</div>
                    </div>
                </div>`;
            };

            const renderReports = () => `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-200 dark:border-gray-700">
                    <h3 class="font-bold dark:text-gray-50">Report Mensile</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Ottobre 2025</p>
                    <div class="mt-4 h-48 w-full bg-gray-50 dark:bg-gray-700/50 rounded-lg flex items-end justify-around px-2 space-x-2">
                        ${[60, 80, 75, 90].map(val => `<div class="bg-green-500 w-full rounded-t-sm" style="height: ${val}%" title="${val}€"></div>`).join('')}
                    </div>
                    <div class="mt-2 flex justify-around text-xs text-gray-500 dark:text-gray-400"><span>Set</span><span>Ago</span><span>Lug</span><span>Giu</span></div>
                    <button class="w-full text-center mt-4 bg-gray-100 dark:bg-gray-700 text-sm font-semibold py-2 rounded-lg active-feedback dark:text-gray-200">Scarica Report Completo</button>
                </div>`;

            const renderForecasts = () => `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-200 dark:border-gray-700">
                    <h3 class="font-bold dark:text-gray-50">Previsione Spese</h3>
                     <p class="text-sm text-gray-500 dark:text-gray-400">Prossimi 3 mesi</p>
                    <div class="mt-4 bg-yellow-100 dark:bg-yellow-900/50 p-3 rounded-lg border border-yellow-200 dark:border-yellow-800/50">
                        <p class="font-semibold text-yellow-800 dark:text-yellow-300">Analisi IA</p>
                        <p class="text-sm text-gray-700 dark:text-yellow-400">Previsto un aumento del 15% delle spese per utenze nei mesi invernali.</p>
