            if (MOCK_DATA.user.plan === 'Premium') {
                price = fullPrice * 0.7; // 30% discount
                priceText = `<span class="line-through text-gray-500">${fullPrice}€</span> <strong class="text-green-600">${price.toFixed(2).replace('.', ',')}€</strong> (Sconto 30%)`;
