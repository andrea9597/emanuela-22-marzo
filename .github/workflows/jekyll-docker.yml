        function handleAiChatImageUpload() {
            const plan = MOCK_DATA.user.plan;
            const planConfig = PLANS.find(p => p.name === plan);
            const planLimits = planConfig ? planConfig.limits : {};

            if (plan === 'Base') {
                showUpgradeModalForFeature('Condividere immagini con l\'IA');
                return;
            }

            if (plan === 'Premium') {
                if (appState.aiImageUploadCount >= planLimits.aiImages) {
                    showAiLimitReachedModal();
                    return;
                }
            }

            MOCK_DATA.chatHistory.push({ role: 'user', text: '<div class="p-2 bg-gray-200 dark:bg-gray-600 rounded-lg inline-block"><img src="https://placehold.co/200x150/E2E8F0/4A5568?text=Foto+caricata" class="rounded-md"><p class="text-xs text-center mt-1 text-gray-600 dark:text-gray-300">Foto caricata</p></div>' });
            renderChatMessages('chatHistory');

            if (MOCK_DATA.user.plan === 'Premium') {
                appState.aiImageUploadCount++;
                const remaining = planLimits.aiImages - appState.aiImageUploadCount;
                MOCK_DATA.chatHistory.push({ role: 'assistant', text: `Analisi in corso... (Ti restano ${remaining} caricamenti per oggi)` });
            } else { // This handles the Pro plan, which has no limits
                MOCK_DATA.chatHistory.push({ role: 'assistant', text: '<div class="loader"></div>' });
            }
            renderChatMessages('chatHistory');

            setTimeout(() => {
                 MOCK_DATA.chatHistory.pop();
                 MOCK_DATA.chatHistory.push({ role: 'assistant', text: "Ok, ho ricevuto l'immagine. Dall'analisi sembra una perdita d'acqua lieve dal sifone. Il rischio è basso, ma ti consiglio di contattare un idraulico per un controllo." });
                 renderChatMessages('chatHistory');
            }, 2500);
        }

