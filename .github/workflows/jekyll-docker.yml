        function addSensor(sensorId) { const sensorToAdd = AVAILABLE_SENSORS.find(s => s.id === sensorId); if (sensorToAdd && !MOCK_DATA.guardian.sensors.some(s => s.id === sensorId)) { MOCK_DATA.guardian.sensors.push({ id: sensorToAdd.id, name: sensorToAdd.name, status: 'ok', location: sensorToAdd.location, icon: sensorToAdd.icon, battery: 100 }); } showManageSensorsModal(); if (appState.currentPage === 'guardian') { renderAllMain(); } }
