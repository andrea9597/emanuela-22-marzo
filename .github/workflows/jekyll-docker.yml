                        <p class="text-sm mt-1">${step.description}</p>
                        <div class="flex mt-4 space-x-3">
                            <button ${currentStep === 0 ? 'disabled' : ''} id="ar-prev" class="w-1/2 bg-gray-600 font-semibold py-2.5 rounded-lg disabled:opacity-50 active-feedback">Indietro</button>
                            <button id="ar-next" class="w-1/2 bg-blue-600 font-semibold py-2.5 rounded-lg active-feedback">${isLastStep ? 'Fine' : 'Avanti'}</button>
                        </div>
                    </div>
                </div>`;
            };

            const updateArModal = () => {
                showModal(renderArStep(), 'w-full h-full max-w-md');
