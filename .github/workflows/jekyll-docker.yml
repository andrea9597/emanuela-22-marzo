                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center text-sm">
                        ${daysHTML}
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold text-lg mb-2 dark:text-gray-50">Eventi del ${selectedDateObj.toLocaleDateString('it-IT', {day: 'numeric', month: 'long'})}</h3>
                    <div class="space-y-3">
                        ${eventsListHTML}
                    </div>
                </div>
            </div>
            `;
        }

        function renderProjectDetailPage(projectId) {
            const project = MOCK_DATA.projects.find(p => p.id === projectId);
            if (!project) return `<p>Progetto non trovato.</p>`;

            const renderOverviewTab = () => {
                const budgetProgress = project.budget.total > 0 ? (project.budget.spent / project.budget.total) * 100 : 0;
                const today = new Date("2025-10-20"); // Using a fixed date for consistent demo
                const startDate = new Date(project.startDate);
                const endDate = new Date(project.endDate);
                const totalDuration = (endDate - startDate) / (1000 * 60 * 60 * 24);
                const elapsedDuration = (today - startDate) / (1000 * 60 * 60 * 24);
                const timelineProgress = Math.max(0, Math.min(100, (elapsedDuration / totalDuration) * 100));

                return `
                    <div class="space-y-6">
                        <div>
                            <h4 class="font-semibold text-lg mb-2 dark:text-gray-100">Budget</h4>
                            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl border dark:border-gray-700">
                                <div class="flex justify-between items-center text-lg mb-2">
                                    <span class="font-bold text-blue-600 dark:text-blue-400">${project.budget.spent.toLocaleString('it-IT')}€</span>
                                    <span class="text-gray-500 dark:text-gray-400">/ ${project.budget.total.toLocaleString('it-IT')}€</span>
                                </div>
                                <div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-4">
                                    <div class="bg-blue-600 h-4 rounded-full flex items-center justify-center text-white text-xs font-bold" style="width: ${budgetProgress}%">${Math.round(budgetProgress)}%</div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h4 class="font-semibold text-lg mb-2 dark:text-gray-100">Timeline</h4>
                            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl border dark:border-gray-700">
                                <div class="flex justify-between items-center text-sm mb-2 dark:text-gray-200">
                                    <span>${startDate.toLocaleDateString('it-IT')}</span>
                                    <span>${endDate.toLocaleDateString('it-IT')}</span>
                                </div>
                                <div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-2.5">
                                    <div class="bg-green-500 h-2.5 rounded-full" style="width: ${timelineProgress}%"></div>
                                </div>
                                <p class="text-xs text-center mt-2 text-gray-500 dark:text-gray-400">${Math.round(totalDuration)} giorni totali</p>
                            </div>
                        </div>
                    </div>
                `;
            };

            const renderChecklistTab = () => {
                const checklistHTML = project.checklist.map(item => `
                    <label for="task-${item.id}" class="flex items-center p-3 bg-white dark:bg-gray-700/50 rounded-lg border dark:border-gray-700 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                        <input type="checkbox" id="task-${item.id}" ${item.completed ? 'checked' : ''} class="h-5 w-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 dark:bg-gray-900 dark:border-gray-600 dark:checked:bg-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800">
                        <span class="ml-3 text-gray-800 dark:text-gray-200 ${item.completed ? 'line-through text-gray-500' : ''}">${item.task}</span>
                    </label>
                `).join('');
                return `<div class="space-y-3">${checklistHTML}</div>`;
            };

            const renderDocumentsTab = () => {
                const documentsHTML = project.documents.map(docLink => {
                    const doc = MOCK_DATA.documents.find(d => d.id === docLink.docId);
                    return `
                    <div onclick="showDocumentModal(${doc.id})" class="bg-white dark:bg-gray-800 p-3 rounded-xl border dark:border-gray-700 flex items-center cursor-pointer active-feedback">
                        <div class="mr-3">${ICONS[doc.icon] || ICONS['file-text']}</div>
                        <div>
                            <p class="font-semibold dark:text-gray-100">${doc.name}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Aggiunto il ${new Date(doc.date).toLocaleDateString('it-IT')}</p>
                        </div>
                    </div>
                    `;
                }).join('');
                return `<div class="space-y-3">${documentsHTML || '<p class="text-sm text-center py-4">Nessun documento collegato.</p>'}
                    <button onclick="showAttachDocumentToProjectModal(${project.id})" class="w-full text-left p-3 bg-gray-100 dark:bg-gray-700 border-2 border-dashed rounded-lg flex items-center justify-center text-sm font-semibold text-gray-600 dark:text-gray-300 mt-2 hover:bg-gray-200 dark:hover:bg-gray-600 active-feedback">
                        <i class="ph-plus-circle-fill mr-2"></i>Allega Documento
                    </button>
                </div>`;
            };
            
            const renderGalleryTab = () => {
                const galleryHTML = project.gallery.map((img, index) => 
                    `<img src="${img}" class="rounded-lg aspect-video object-cover ${index === 0 ? 'col-span-2' : ''}">`
                ).join('');

                return `<div class="grid grid-cols-2 gap-3">
                    ${galleryHTML.length > 0 ? galleryHTML : ''}
                    <div onclick="simulateAddPhotoToProject(${project.id})" class="bg-gray-100 dark:bg-gray-700 border-2 border-dashed rounded-lg flex items-center justify-center cursor-pointer aspect-video active-feedback ${galleryHTML.length > 0 ? '' : 'col-span-2'}">
                        <i class="ph-plus text-2xl text-gray-500"></i>
                    </div>
                </div>`;
            };

            const renderProfessionalsTab = () => {
                const professionalsHTML = project.professionals.map(profLink => {
                    const prof = MOCK_DATA.professionals.find(p => p.id === profLink.profId);
                    return `
                    <div onclick="navigate('professionalProfile', {id: ${prof.id}})" class="bg-white dark:bg-gray-800 p-4 rounded-xl border dark:border-gray-700 flex items-center cursor-pointer active-feedback">
                        <img src="${prof.avatar}" class="w-12 h-12 rounded-full mr-4 object-cover">
                        <div>
                            <h3 class="font-bold dark:text-gray-100">${prof.name}</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400">${prof.service}</p>
                        </div>
                    </div>
                    `;
                }).join('');
                return `<div class="space-y-3">${professionalsHTML}</div>`;
            };

            return `
            <div class="space-y-6">
                <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl border dark:border-gray-700">
                    <div class="flex justify-between items-start">
                        <div class="flex-grow pr-4">
                             <h2 class="text-2xl font-bold dark:text-gray-50">${project.name}</h2>
                             <p class="text-gray-500 dark:text-gray-400 mt-1">${project.description}</p>
                        </div>
                        <button onclick="showEditProjectModal(${project.id})" class="flex-shrink-0 text-gray-500 dark:text-gray-400 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 active-feedback">${ICONS.pencil}</button>
                    </div>
                </div>
                
                ${renderOverviewTab()}
                
                <div>
                    <h4 class="font-semibold text-lg mb-2 dark:text-gray-100">Checklist Lavori</h4>
                    ${renderChecklistTab()}
                </div>

                <div>
                    <h4 class="font-semibold text-lg mb-2 dark:text-gray-100">Documenti</h4>
                    ${renderDocumentsTab()}
                </div>
                
                <div>
                    <h4 class="font-semibold text-lg mb-2 dark:text-gray-100">Galleria Progressi</h4>
                    ${renderGalleryTab()}
                </div>

                <div>
                    <h4 class="font-semibold text-lg mb-2 dark:text-gray-100">Professionisti Coinvolti</h4>
                    ${renderProfessionalsTab()}
                </div>

                <div class="mt-6">
                    <button onclick="showDeleteProjectConfirmationModal(${project.id})" class="w-full bg-red-100 text-red-700 font-semibold py-3 rounded-xl active-feedback border border-red-200 hover:bg-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-700 dark:hover:bg-red-900/50">Elimina Progetto</button>
                </div>
            </div>
            `;
        }

        function showAddProjectModal() {
            // Reset state for the new project form
            appState.newProjectCoverPhoto = null;
            appState.newProjectDocuments = [];
            
            const modalContent = `
            <div class="p-6 text-left max-h-[85vh] overflow-y-auto">
                <h2 class="text-xl font-bold mb-4 dark:text-gray-50">Nuovo Progetto</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-sm font-medium dark:text-gray-300">Nome Progetto</label>
                        <input type="text" id="newProjectName" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Es. Ristrutturazione Cucina">
                    </div>
                    <div>
                        <label class="text-sm font-medium dark:text-gray-300">Descrizione</label>
                        <textarea id="newProjectDesc" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" rows="2"></textarea>
                    </div>
                    <div>
                        <label class="text-sm font-medium dark:text-gray-300">Foto Copertina</label>
                        <div id="new-project-photo-container">
                             <button onclick="simulateAddPhotoToNewProject()" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 border-2 border-dashed rounded-lg py-4 mt-1 flex flex-col items-center justify-center active-feedback">
                                ${ICONS.camera} <span class="mt-1 font-semibold text-sm">Aggiungi Foto</span>
                             </button>
                        </div>
                    </div>
                     <div>
                        <label class="text-sm font-medium dark:text-gray-300">Documenti</label>
                        <div id="new-project-docs-container">
                            <button onclick="showAttachDocumentToNewProjectModal()" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 border-2 border-dashed rounded-lg py-4 mt-1 flex flex-col items-center justify-center active-feedback">
                                <i class="ph-paperclip text-xl"></i> <span class="mt-1 font-semibold text-sm">Allega Documenti</span>
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300">Budget Totale (€)</label>
                            <input type="number" id="newProjectBudget" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        </div>
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300">Icona</label>
                            <select id="newProjectIcon" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                <option value="wrench">Riparazione</option>
                                <option value="paint-brush">Miglioramento</option>
                                <option value="bathtub">Bagno</option>
                                <option value="cooking-pot">Cucina</option>
                                <option value="squares-four">Pavimenti/Piastrelle</option>
                                <option value="solar-panel">Energia</option>
                                <option value="tree">Giardino</option>
                                <option value="lightbulb">Illuminazione</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button onclick="hideModal()" class="bg-gray-200 dark:bg-gray-600 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg active-feedback">Annulla</button>
                    <button onclick="addNewProject()" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg active-feedback">Crea Progetto</button>
                </div>
            </div>
            `;
            showModal(modalContent);
        }

        function simulateAddPhotoToNewProject() {
            appState.newProjectCoverPhoto = 'https://placehold.co/400x300/3B82F6/FFFFFF?text=Copertina';
            const container = document.getElementById('new-project-photo-container');
            if(container) {
                container.innerHTML = `<img src="${appState.newProjectCoverPhoto}" class="w-full rounded-lg aspect-video object-cover mt-1">`;
            }
        }

        function showAttachDocumentToNewProjectModal() {
            const docs = MOCK_DATA.documents.filter(d => d.homeId === MOCK_DATA.currentHomeId);
            const docsHTML = docs.map(d => `
                <label class="flex items-center p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg cursor-pointer">
                    <input type="checkbox" value="${d.id}" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 new-project-doc-checkbox" ${appState.newProjectDocuments.includes(d.id) ? 'checked' : ''}>
                    <span class="ml-3 dark:text-gray-200">${d.name}</span>
                </label>
            `).join('');

            const subModalContent = `
            <div class="p-6 text-left">
                <h2 class="text-xl font-bold mb-4 dark:text-gray-100">Seleziona Documenti</h2>
                <div class="space-y-1 max-h-60 overflow-y-auto border-y dark:border-gray-700 py-2">${docsHTML}</div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button onclick="showAddProjectModal(); updateNewProjectDocumentsUI();" class="bg-gray-200 dark:bg-gray-600 font-semibold py-2 px-4 rounded-lg active-feedback">Annulla</button>
                    <button onclick="updateNewProjectDocuments()" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg active-feedback">Allega</button>
                </div>
            </div>`;
            showModal(subModalContent);
        }
        
        function updateNewProjectDocuments() {
            const checkboxes = document.querySelectorAll('.new-project-doc-checkbox:checked');
            appState.newProjectDocuments = Array.from(checkboxes).map(cb => parseInt(cb.value));
            showAddProjectModal(); // Go back to the main modal
            updateNewProjectDocumentsUI();
        }
        
        function updateNewProjectDocumentsUI() {
             const docsContainer = document.getElementById('new-project-docs-container');
             if(docsContainer) {
                 if(appState.newProjectDocuments.length > 0) {
                     docsContainer.innerHTML = `<div class="mt-1 p-3 bg-blue-50 dark:bg-blue-900/40 border dark:border-blue-800/60 rounded-lg text-sm text-blue-800 dark:text-blue-300 font-semibold">${appState.newProjectDocuments.length} documenti allegati. <button onclick="showAttachDocumentToNewProjectModal()" class="ml-2 font-bold underline">Modifica</button></div>`;
                 } else {
                      docsContainer.innerHTML = `<button onclick="showAttachDocumentToNewProjectModal()" class="w-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 border-2 border-dashed rounded-lg py-4 mt-1 flex flex-col items-center justify-center active-feedback">
                                <i class="ph-paperclip text-xl"></i> <span class="mt-1 font-semibold text-sm">Allega Documenti</span>
                       </button>`;
                 }
             }
        }


        function addNewProject() {
            const name = document.getElementById('newProjectName').value;
            const description = document.getElementById('newProjectDesc').value;
            const budget = parseFloat(document.getElementById('newProjectBudget').value);
            const icon = document.getElementById('newProjectIcon').value;

            if (!name || !budget) { return; }

            const newId = MOCK_DATA.projects.length > 0 ? Math.max(...MOCK_DATA.projects.map(p => p.id)) + 1 : 1;
            
            const attachedDocs = appState.newProjectDocuments.map(docId => {
                const doc = MOCK_DATA.documents.find(d => d.id === docId);
                return { name: doc.name, docId: docId };
            });

            const newProject = {
                id: newId,
                homeId: MOCK_DATA.currentHomeId,
                name: name,
                description: description,
                budget: { total: budget, spent: 0 },
                status: "planned",
                startDate: new Date().toISOString().slice(0, 10),
                endDate: new Date(new Date().setMonth(new Date().getMonth() + 1)).toISOString().slice(0, 10), // Default to 1 month
                checklist: [],
                documents: attachedDocs,
                gallery: appState.newProjectCoverPhoto ? [appState.newProjectCoverPhoto] : [],
                professionals: [],
                icon: icon
            };

            MOCK_DATA.projects.unshift(newProject);
            
            // Reset state variables
            appState.newProjectCoverPhoto = null;
            appState.newProjectDocuments = [];
            
            hideModal();
            renderAllMain();
        }

        function showEditProjectModal(projectId) {
            const project = MOCK_DATA.projects.find(p => p.id === projectId);
            if (!project) return;

            const modalContent = `
            <div class="p-6 text-left">
                <h2 class="text-xl font-bold mb-4 dark:text-gray-50">Modifica Progetto</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-sm font-medium dark:text-gray-300">Nome Progetto</label>
                        <input type="text" id="editProjectName" value="${project.name}" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                    </div>
                    <div>
                        <label class="text-sm font-medium dark:text-gray-300">Descrizione</label>
                        <textarea id="editProjectDesc" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white" rows="3">${project.description}</textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300">Budget Totale (€)</label>
                            <input type="number" id="editProjectBudget" value="${project.budget.total}" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        </div>
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300">Icona</label>
                            <select id="editProjectIcon" class="mt-1 block w-full p-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                                <option value="wrench" ${project.icon === 'wrench' ? 'selected' : ''}>Riparazione</option>
                                <option value="paint-brush" ${project.icon === 'paint-brush' ? 'selected' : ''}>Miglioramento</option>
                                <option value="bathtub" ${project.icon === 'bathtub' ? 'selected' : ''}>Bagno</option>
                                <option value="cooking-pot" ${project.icon === 'cooking-pot' ? 'selected' : ''}>Cucina</option>
                                <option value="squares-four" ${project.icon === 'squares-four' ? 'selected' : ''}>Pavimenti/Piastrelle</option>
                                <option value="solar-panel" ${project.icon === 'solar-panel' ? 'selected' : ''}>Energia</option>
                                <option value="tree" ${project.icon === 'tree' ? 'selected' : ''}>Giardino</option>
                                <option value="lightbulb" ${project.icon === 'lightbulb' ? 'selected' : ''}>Illuminazione</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button onclick="hideModal()" class="bg-gray-200 dark:bg-gray-600 dark:text-gray-200 font-semibold py-2 px-4 rounded-lg active-feedback">Annulla</button>
                    <button onclick="saveProjectChanges(${projectId})" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg active-feedback">Salva Modifiche</button>
                </div>
            </div>
            `;
            showModal(modalContent);
        }

        function saveProjectChanges(projectId) {
            const project = MOCK_DATA.projects.find(p => p.id === projectId);
            if (!project) return;

            const name = document.getElementById('editProjectName').value;
            const description = document.getElementById('editProjectDesc').value;
            const budget = parseFloat(document.getElementById('editProjectBudget').value);
            const icon = document.getElementById('editProjectIcon').value;

            if (!name || isNaN(budget)) { return; }

            project.name = name;
            project.description = description;
            project.budget.total = budget;
            project.icon = icon;

            hideModal();
            renderAllMain();
        }

        function showDeleteProjectConfirmationModal(projectId) {
            const project = MOCK_DATA.projects.find(p => p.id === projectId);
            if (!project) return;
            showModal(`<div class="p-6">
                <h2 class="text-xl font-bold mb-2">Conferma Eliminazione</h2>
                <p class="text-gray-600 dark:text-gray-300 mb-6">Sei sicuro di voler eliminare il progetto "<strong>${project.name}</strong>"? L'azione è irreversibile.</p>
                <div class="flex space-x-4">
                    <button onclick="hideModal()" class="w-full bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 font-semibold py-2.5 rounded-xl active-feedback">Annulla</button>
                    <button onclick="deleteProject(${projectId})" class="w-full bg-red-600 text-white font-semibold py-2.5 rounded-xl active-feedback">Elimina</button>
                </div>
            </div>`);
        }

        function deleteProject(projectId) {
            MOCK_DATA.projects = MOCK_DATA.projects.filter(p => p.id !== projectId);
            hideModal();
            navigate('projects');
        }

        function showAttachDocumentToProjectModal(projectId) {
            const docs = MOCK_DATA.documents.filter(d => d.homeId === MOCK_DATA.currentHomeId);
            const docsHTML = docs.map(d => `<div class="p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg cursor-pointer active-feedback dark:text-gray-200" onclick="attachDocumentToProject(${projectId}, ${d.id})">${d.name}</div>`).join('');
            showModal(`<div class="p-4 text-left"><h2 class="text-xl font-bold mb-4 text-center dark:text-gray-100">Allega Documento al Progetto</h2><div class="space-y-1 max-h-60 overflow-y-auto">${docsHTML}</div><button onclick="hideModal()" class="w-full bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 font-semibold py-2 mt-4 rounded-lg active-feedback">Annulla</button></div>`);
        }

        function attachDocumentToProject(projectId, docId) {
            const project = MOCK_DATA.projects.find(p => p.id === projectId);
            const doc = MOCK_DATA.documents.find(d => d.id === docId);
            if (project && doc && !project.documents.some(d => d.docId === docId)) {
                project.documents.push({ name: doc.name, docId: doc.id });
            }
            hideModal();
            renderAllMain();
        }

        function simulateAddPhotoToProject(projectId) {
