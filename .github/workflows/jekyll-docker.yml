        function checkPlanLimit(feature) {
            const plan = PLANS.find(p => p.name === MOCK_DATA.user.plan);
            if (!plan || !plan.limits || plan.limits[feature] === undefined) {
                return false; // No limit for this feature on this plan
            }

            const limit = plan.limits[feature];
            let currentCount;

            switch(feature) {
                case 'documents':
                    currentCount = MOCK_DATA.documents.filter(d => d.homeId === MOCK_DATA.currentHomeId).length;
                    break;
                case 'inventory':
                    currentCount = MOCK_DATA.inventory.filter(i => i.homeId === MOCK_DATA.currentHomeId).length;
                    break;
                case 'homes':
                    currentCount = MOCK_DATA.homes.length;
                    break;
                default:
                    return false;
            }
            return currentCount >= limit;
        }

