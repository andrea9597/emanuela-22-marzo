        function addNewMaintenance() { const name = document.getElementById('newMaintName').value; const date = document.getElementById('newMaintDate').value; const priority = document.getElementById('newMaintPriority').value; if(!name || !date) {return;} const newId = MOCK_DATA.maintenance.length > 0 ? Math.max(...MOCK_DATA.maintenance.map(m => m.id)) + 1 : 1; MOCK_DATA.maintenance.unshift({id: newId, homeId: MOCK_DATA.currentHomeId, name: name, date: date, time: "09:00", priority: priority, icon: 'tool'}); hideModal(); renderAllMain(); }
        
        function changeMonth(offset) {
            appState.calendarDate.setMonth(appState.calendarDate.getMonth() + offset);
            // Select the first day of the new month by default
            appState.selectedCalendarDate = new Date(appState.calendarDate.getFullYear(), appState.calendarDate.getMonth(), 1).toISOString().slice(0,10);
            renderAllMain();
        }

        function selectDate(dateString) {
            appState.selectedCalendarDate = dateString;
            renderAllMain();
        }

        function renderCalendarView() {
            const today = new Date();
            const currentMonth = appState.calendarDate.getMonth();
            const currentYear = appState.calendarDate.getFullYear();

            const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();
            // JS getDay() is Sun=0, Mon=1... I need Mon=0, Sun=6
            const startingDay = (firstDayOfMonth === 0) ? 6 : firstDayOfMonth - 1; 

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            const monthName = appState.calendarDate.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
            
            // Get events for the current month
            const maintenanceEvents = MOCK_DATA.maintenance.filter(e => {
                const eventDate = new Date(e.date);
                return eventDate.getFullYear() === currentYear && eventDate.getMonth() === currentMonth;
            });
            const expiryEvents = MOCK_DATA.documents.filter(d => d.expiryDate).filter(e => {
                const eventDate = new Date(e.expiryDate);
                return eventDate.getFullYear() === currentYear && eventDate.getMonth() === currentMonth;
            });
            const warrantyEvents = MOCK_DATA.inventory.filter(i => i.warrantyExpiryDate).filter(e => {
                const eventDate = new Date(e.warrantyExpiryDate);
                return eventDate.getFullYear() === currentYear && eventDate.getMonth() === currentMonth;
            });
            const paymentEvents = MOCK_DATA.costs.filter(e => {
                const eventDate = new Date(e.date);
                return eventDate.getFullYear() === currentYear && eventDate.getMonth() === currentMonth;
            });
            
            const eventsByDay = {};
            maintenanceEvents.forEach(e => {
                const day = new Date(e.date).getDate();
                if (!eventsByDay[day]) eventsByDay[day] = [];
                eventsByDay[day].push({ type: 'maintenance', ...e });
            });
            expiryEvents.forEach(e => {
                const day = new Date(e.expiryDate).getDate();
                if (!eventsByDay[day]) eventsByDay[day] = [];
                eventsByDay[day].push({ type: 'expiry', ...e });
            });
            warrantyEvents.forEach(e => {
                const day = new Date(e.warrantyExpiryDate).getDate();
                if (!eventsByDay[day]) eventsByDay[day] = [];
                eventsByDay[day].push({ type: 'warranty', ...e });
            });
            paymentEvents.forEach(e => {
                const day = new Date(e.date).getDate();
                if (!eventsByDay[day]) eventsByDay[day] = [];
                eventsByDay[day].push({ type: 'payment', ...e });
            });


            let daysHTML = '';
            // Empty cells for days before the first of the month
            for (let i = 0; i < startingDay; i++) {
                daysHTML += `<div></div>`;
            }

            // Cells for each day of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = dateString === appState.selectedCalendarDate;
                const isToday = day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
                const hasEvent = eventsByDay[day] && eventsByDay[day].length > 0;

                let dayClasses = 'relative flex items-center justify-center h-10 rounded-full cursor-pointer transition-colors active-feedback ';
                if (isSelected) {
                    dayClasses += 'bg-blue-600 text-white font-bold';
                } else if (isToday) {
                    dayClasses += 'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 font-bold';
                } else {
                    dayClasses += 'hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-gray-200';
                }

                const eventDot = hasEvent ? '<div class="absolute bottom-1 w-1.5 h-1.5 rounded-full bg-red-500"></div>' : '';

                daysHTML += `<div onclick="selectDate('${dateString}')" class="${dayClasses}">${day}${eventDot}</div>`;
            }
            
            // Event details for selected day
            const selectedDateObj = new Date(appState.selectedCalendarDate);
            const selectedDay = selectedDateObj.getDate();
            const selectedEvents = eventsByDay[selectedDay] || [];
            
            let eventsListHTML = '<p class="text-center text-sm text-gray-500 py-4">Nessun evento per oggi.</p>';
            if (selectedEvents.length > 0) {
                eventsListHTML = selectedEvents.map(event => {
                    if (event.type === 'maintenance') {
                        return `
                        <div class="bg-white dark:bg-gray-800 p-3 rounded-xl border-l-4 border-blue-500">
                            <p class="font-semibold dark:text-gray-100">${event.name}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Intervento alle ${event.time || 'N/A'}</p>
                        </div>
                        `;
                    } else if (event.type === 'expiry') {
                        return `
                        <div class="bg-white dark:bg-gray-800 p-3 rounded-xl border-l-4 border-yellow-500">
                            <p class="font-semibold dark:text-gray-100">Scadenza: ${event.name}</p>
