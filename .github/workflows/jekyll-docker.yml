        function calculateHealthScores() {
            const currentHomeId = MOCK_DATA.currentHomeId;
            if (!currentHomeId) return { totalScore: 0, docScore: 0, maintScore: 0, efficiencyScore: 0 };

            const docs = MOCK_DATA.documents.filter(d => d.homeId === currentHomeId);
            const maintenances = MOCK_DATA.maintenance.filter(m => m.homeId === currentHomeId);
            
            const hasAPE = docs.some(d => d.name.includes("APE"));
            const upcomingMaintenancesCount = maintenances.filter(m => new Date(m.date) > new Date()).length;
            
            const docScore = Math.min(100, docs.length * 15 + (hasAPE ? 40 : 0));
            const maintScore = Math.min(100, upcomingMaintenancesCount * 25);
            const efficiencyScore = 85; // Hardcoded, consistent value

            const totalScore = Math.round((docScore + maintScore + efficiencyScore) / 3);

            return { totalScore, docScore, maintScore, efficiencyScore };
        }

        function renderHealthScoreWidget() {
            const { totalScore, docScore, maintScore, efficiencyScore } = calculateHealthScores();

            let scoreColor = 'text-green-600';
            if (totalScore < 75) { scoreColor = 'text-yellow-600'; }
            if (totalScore < 50) { scoreColor = 'text-red-600'; }

            const renderProgressBar = (score, label) => {
                let barColor = 'bg-green-500';
                if (score < 75) barColor = 'bg-yellow-500';
                if (score < 50) barColor = 'bg-red-500';
                return `
                    <div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="font-medium text-gray-600 dark:text-gray-300">${label}</span>
                            <span class="font-bold ${score < 50 ? 'text-red-600' : (score < 75 ? 'text-yellow-600' : 'text-green-600')}">${score}</span>
                        </div>
                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-1">
                            <div class="${barColor} h-2 rounded-full" style="width: ${score}%"></div>
                        </div>
                    </div>`;
            };

            return `<div data-onboarding="health-score-widget" onclick="navigate('healthScoreDetail')" class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm cursor-pointer hover:shadow-md transition-shadow active-feedback">
                <div class="flex justify-between items-center">
                    <h2 class="font-semibold text-lg dark:text-gray-50">Salute Casa</h2>
                    <span class="font-bold text-2xl ${scoreColor}">${totalScore}/100</span>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Panoramica dello stato del tuo immobile.</p>
                <div class="space-y-3">
                    ${renderProgressBar(docScore, 'Documentazione')}
                    ${renderProgressBar(maintScore, 'Manutenzioni')}
                    ${renderProgressBar(efficiencyScore, 'Efficienza Energetica')}
                </div>
            </div>`;
        }

        function renderGuardianWidget() {
            const sensorOk = MOCK_DATA.guardian.sensors.every(s => s.status === 'ok');
            const statusColor = sensorOk ? 'text-green-600 dark:text-green-400' : 'text-yellow-600 dark:text-yellow-400';
            const statusBg = sensorOk ? 'bg-green-100 dark:bg-green-900/50' : 'bg-yellow-100 dark:bg-yellow-900/50';
            const statusText = sensorOk ? 'Tutto OK' : 'Avvisi Attivi';

            return `<div onclick="navigate('guardian')" class="bg-white dark:bg-gray-800 p-4 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm cursor-pointer hover:shadow-md transition-shadow active-feedback">
                <div class="flex justify-between items-center">
                    <h2 class="font-semibold text-lg dark:text-gray-50 flex items-center"><i class="ph-shield-check text-xl mr-2"></i><span>Guardian</span></h2>
